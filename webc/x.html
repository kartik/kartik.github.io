<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Feed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f0f0;
            color: #0f1419;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }

        .control-panel {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 5px 10px;
            background-color: #fff;
        }

        .search-input input {
            border: none;
            outline: none;
            padding: 5px;
            font-size: 1em;
            border-radius: 20px;
            width: 160px;
        }

        .search-input button {
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 5px;
            font-size: 1.2em;
            color: #0f1419;
        }

        .time-range {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chip {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background-color: #e0e0e0;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            font-size: 0.9em;
        }

        .chip.active, .chip:hover {
            background-color: #0f1419;
            color: #fff;
        }

        .feed-label {
            text-align: center;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 10px;
        }

        #postsContainer {
            margin-top: 10px;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card-header {
            padding: 15px 20px;
        }

        .repost-label {
            font-size: 0.78em;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: inherit;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ddd;
            object-fit: cover;
            flex-shrink: 0;
        }

        .avatar-mono {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        .author-info {
            flex: 1;
            min-width: 0;
        }

        .author-name {
            font-weight: 600;
            font-size: 0.95em;
            color: #0f1419;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .author-handle {
            font-size: 0.8em;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tweet-body {
            font-size: 0.95em;
            word-wrap: break-word;
        }

        .tweet-body p {
            margin-bottom: 8px;
        }

        .tweet-body p:last-child {
            margin-bottom: 0;
        }

        .tweet-body a {
            color: #1d9bf0;
            text-decoration: none;
            word-break: break-word;
        }

        .tweet-body a:hover {
            text-decoration: underline;
        }

        .tweet-body hr {
            display: none;
        }

        .tweet-body img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 10px;
            background-color: #f5f5f5;
            display: block;
        }

        .tweet-body blockquote {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 0.92em;
            background-color: #fafafa;
        }

        .tweet-body blockquote b {
            display: block;
            font-size: 0.95em;
            margin-bottom: 4px;
            color: #0f1419;
        }

        .tweet-body blockquote p {
            margin-bottom: 4px;
        }

        .tweet-body blockquote footer,
        .tweet-body blockquote cite {
            display: none;
        }

        .card-stats {
            display: flex;
            gap: 16px;
            font-size: 0.85em;
            color: #555;
            padding-top: 10px;
            margin-top: 10px;
            border-top: 1px solid #f0f0f0;
            align-items: center;
        }

        .x-link {
            font-size: 0.85em;
            color: #1d9bf0;
            text-decoration: none;
        }

        .x-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2em;
            color: #555;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0f1419;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.5s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .time-range {
                gap: 5px;
            }
            .chip {
                padding: 6px 12px;
                font-size: 0.85em;
            }
            .search-input input {
                width: 130px;
            }
        }

        /* ---- dark mode (default) ---- */
        body { background-color: #000000; color: #e7e9ea; }
        .search-input { border-color: #2f3336; background-color: #16181c; }
        .search-input input { color: #e7e9ea; background: transparent; }
        .search-input input::placeholder { color: #71767b; }
        .search-input button { color: #e7e9ea; }
        .chip { background-color: #2a2d31; color: #e7e9ea; }
        .chip.active, .chip:hover { background-color: #1d9bf0; color: #fff; }
        .feed-label { color: #71767b; }
        .card { background-color: #16181c; box-shadow: 0 1px 0 #2f3336; }
        .author-name { color: #e7e9ea; }
        .avatar { background-color: #2a2d31; }
        .tweet-body img { background-color: #2a2d31; }
        .tweet-body blockquote { border-color: #2f3336; background-color: #1c1f23; }
        .tweet-body blockquote b { color: #e7e9ea; }
        .card-stats { color: #8b98a5; border-top-color: #2f3336; }
        .loading { color: #8b98a5; }
        .spinner { border-color: #2f3336; border-top-color: #1d9bf0; }

        /* ---- skeleton placeholders (shown only on a cold first load) ---- */
        .skeleton { pointer-events: none; }
        .skeleton .card-header { padding: 15px 20px; }
        .sk-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .sk-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a2d31; flex-shrink: 0; }
        .sk-lines { flex: 1; }
        .sk-line { height: 10px; border-radius: 5px; background: #2a2d31; margin-bottom: 9px; }
        .sk-line.short { width: 45%; }
        .sk-line:last-child { margin-bottom: 0; }
        .skeleton .sk-avatar, .skeleton .sk-line { animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* compact "refreshing" indicator (cache shown, fresh data loading) */
        .refreshing { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85em; }
        .refreshing .spinner { width: 16px; height: 16px; border-width: 3px; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <div class="search-input">
                <input type="text" id="searchInput" placeholder="@handle" />
                <button id="searchBtn" title="View handle">→</button>
            </div>
            <div class="time-range">
                <button class="chip" data-time="day">Day</button>
                <button class="chip active" data-time="week">Week</button>
                <button class="chip" data-time="month">Month</button>
                <button class="chip" data-time="all">All</button>
            </div>
        </div>
        <div class="feed-label" id="feedLabel"></div>
        <div id="postsContainer"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            Loading posts...
        </div>
    </div>

    <script>
        // X (Twitter) has no public CORS-enabled API, so we read public RSS from
        // an xcancel (Nitter) instance through the allorigins CORS proxy. Nitter
        // RSS carries the tweet text, media, quote-tweets and timestamps — but no
        // like/retweet counts or replies, so this is a clean read-only feed.
        // Nitter instances are individually flaky/often-down, so we fail over
        // between them: race them on a cold start, then stick to whichever responds.
        const INSTANCES = [
            'https://xcancel.com',
            'https://nitter.net',
            'https://nitter.space',
            'https://lightbrd.com',
            'https://nitter.privacyredirect.com',
            'https://nitter.poast.org'
        ];
        const INSTANCE_HOSTS = INSTANCES.map(u => u.replace(/^https?:\/\//, ''));
        let WORKING_INSTANCE = null;   // sticky once one proves healthy

        // Curated tech / AI accounts on X (handles without @).
        const AI_ACCOUNTS = [
            'sama',
            'OpenAI',
            'AndrewYNg',
            'ylecun',
            'karpathy',
            'GoogleDeepMind',
            'AnthropicAI',
            'demishassabis',
            'JeffDean',
            'fchollet',
            'goodfellow_ian',
            'sundarpichai',
            'satyanadella',
            'pmarca',
            'paulg',
            'emollick',
            'hardmaru',
            'OpenAIDevs',
            // Independent AI reporters / researchers / journalists
            'CaseyNewton',     // Platformer
            'Kantrowitz',      // Big Technology
            'binarybits',      // Understanding AI
            'natolambert',     // Interconnects
            'jackclarkSF',     // Import AI
            'swyx',            // Latent Space / Smol AI News
            'rowancheung',     // The Rundown AI
            'bentossell',      // Ben's Bites
            '_KarenHao',       // Karen Hao
            'EricNewcomer',    // Eric Newcomer
            'jasminewsun',     // Jasmine Sun
            'sharongoldman',   // Sharon Goldman — independent AI journalist (Substack)
            'GarrisonLovely',  // Garrison Lovely — freelance, political economy of AI
            'levie'            // Aaron Levie (Box)
        ];

        // Growing-concurrency pool: start several feeds at once so the first card
        // is the fastest of a batch (not one unlucky slow feed), then widen up to
        // POOL_MAX as feeds complete. No barriers, so a slow feed never blocks others.
        const POOL_START = 4;
        const POOL_MAX = 6;

        let TIMEFRAME = 'week';
        let CUSTOM_HANDLE = '';
        let lock = false;
        let currentReq = 0;   // guards against stale renders when filters change
        const MAX_CARDS = 80;
        const CACHE_MAX = 120;          // posts kept per feed in localStorage
        const CACHE_PREFIX = 'xfeed_v1:';

        // Stale-while-revalidate: render the last good feed instantly, refresh behind it.
        function cacheKeyFor() {
            return CACHE_PREFIX + (CUSTOM_HANDLE ? 'h:' + CUSTOM_HANDLE.toLowerCase() : 'curated');
        }
        function loadCache(key) {
            try {
                const o = JSON.parse(localStorage.getItem(key) || 'null');
                return o && Array.isArray(o.posts) ? o : null;
            } catch (e) { return null; }
        }
        function saveCache(key, posts) {
            try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), posts })); } catch (e) { /* quota / private mode */ }
        }

        const TIME_RANGES = {
            day: 24 * 60 * 60,
            week: 7 * 24 * 60 * 60,
            month: 30 * 24 * 60 * 60,
            all: null
        };

        const MONO_COLORS = ['#1d9bf0', '#0f1419', '#794bc4', '#f91880', '#00ba7c', '#ff7a00', '#536471'];

        document.addEventListener('DOMContentLoaded', () => {
            fetchPosts();

            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    if (chip.classList.contains('active')) return;
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    TIMEFRAME = chip.dataset.time;
                    fetchPosts();
                });
            });

            document.getElementById('searchBtn').addEventListener('click', () => {
                CUSTOM_HANDLE = document.getElementById('searchInput').value.trim().replace(/^@/, '');
                fetchPosts();
            });

            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('searchBtn').click();
            });
        });

        // ---- fetching ----------------------------------------------------------

        function b64ToUtf8(b64) {
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        // Fetch with a hard timeout (so a hung request can't stall the feed) plus an
        // optional external signal (so a race can cancel the losing instances).
        async function fetchText(url, timeoutMs, extSignal) {
            const ctrl = new AbortController();
            const to = setTimeout(() => ctrl.abort(), timeoutMs);
            const onAbort = () => ctrl.abort();
            if (extSignal) {
                if (extSignal.aborted) ctrl.abort();
                else extSignal.addEventListener('abort', onAbort);
            }
            try {
                const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
                return res.ok ? await res.text() : null;
            } finally {
                clearTimeout(to);
                if (extSignal) extSignal.removeEventListener('abort', onAbort);
            }
        }

        function decodeAllorigins(raw) {
            let c;
            try { c = JSON.parse(raw).contents; } catch { return null; }
            if (!c) return null;
            if (c.startsWith('data:')) {
                const idx = c.indexOf('base64,');
                c = idx !== -1 ? b64ToUtf8(c.slice(idx + 7)) : decodeURIComponent(c.slice(c.indexOf(',') + 1));
            }
            return (c.includes('<rss') || c.includes('<item>')) ? c : null;
        }

        // allorigins is the only proxy that reaches Nitter from the browser
        // (corsproxy/codetabs are CORS- or key-gated). It returns transient 500/522
        // errors under load, but those fast-fail and usually clear on retry — so we
        // retry a few times. extSignal lets a race abort this once a winner is found.
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function fetchInstance(instance, path, attempts, extSignal) {
            const target = `${instance}${path}`;
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
            for (let i = 0; i < attempts; i++) {
                if (extSignal && extSignal.aborted) return null;
                try {
                    const raw = await fetchText(url, 12000, extSignal);
                    if (raw) {
                        const xml = decodeAllorigins(raw);
                        if (xml) return xml;
                    }
                } catch (e) { /* timeout / abort / network — retry */ }
                // Backoff before retrying: allorigins often returns a transient
                // error/empty body that only clears a beat later, so an immediate
                // retry just re-hits it. Skip the wait after the final attempt.
                if (i < attempts - 1 && !(extSignal && extSignal.aborted)) {
                    await sleep(700 * (i + 1));
                }
            }
            return null;
        }

        // Find a working instance. allorigins buckles if hit with many concurrent
        // requests, so we probe instances 2 at a time (not all at once): the first
        // of a pair to return valid RSS wins, becomes sticky, and aborts its partner.
        async function establishInstance(path) {
            for (let i = 0; i < INSTANCES.length; i += 2) {
                const batch = INSTANCES.slice(i, i + 2);
                const ctrl = new AbortController();
                const xml = await new Promise(resolve => {
                    let pending = batch.length;
                    let settled = false;
                    batch.forEach(inst => {
                        fetchInstance(inst, path, 3, ctrl.signal).then(x => {
                            if (settled) return;
                            if (x) { settled = true; WORKING_INSTANCE = inst; ctrl.abort(); resolve(x); }
                            else if (--pending === 0) resolve(null);
                        });
                    });
                });
                if (xml) return xml;
            }
            return null;
        }

        // Use the known-good instance if we have one; otherwise probe to find one.
        async function fetchViaProxy(path) {
            if (WORKING_INSTANCE) {
                const xml = await fetchInstance(WORKING_INSTANCE, path, 3);
                if (xml) return xml;
                WORKING_INSTANCE = null;   // it died — fall back to a fresh probe
            }
            return establishInstance(path);
        }

        async function fetchFeed(handle) {
            const xml = await fetchViaProxy(`/${encodeURIComponent(handle)}/rss`);
            if (!xml) return [];
            try {
                return parseFeed(xml, handle);
            } catch (e) {
                console.error('parse error for', handle, e);
                return [];
            }
        }

        function parseFeed(xmlText, handle) {
            const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
            if (doc.querySelector('parsererror')) return [];

            const channelTitle = (doc.querySelector('channel > title')?.textContent || '').trim();
            const ownerName = channelTitle.split(' / ')[0] || handle;
            const ownerAvatar = doc.querySelector('channel > image > url')?.textContent || '';

            const posts = [];
            doc.querySelectorAll('item').forEach(item => {
                const title = item.querySelector('title')?.textContent || '';
                const creatorRaw = (item.getElementsByTagNameNS('*', 'creator')[0]?.textContent || `@${handle}`).trim();
                const creator = creatorRaw.replace(/^@/, '');
                const desc = item.querySelector('description')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                const link = item.querySelector('link')?.textContent || '';

                const rt = title.match(/^RT by @([\w]+):/);
                const isRT = !!rt;

                posts.push({
                    feedHandle: handle,
                    author: creator,
                    authorName: (!isRT && creator.toLowerCase() === handle.toLowerCase()) ? ownerName : creator,
                    avatar: (!isRT && creator.toLowerCase() === handle.toLowerCase()) ? ownerAvatar : '',
                    repostedBy: isRT ? rt[1] : null,
                    descHtml: desc,
                    date: pubDate ? new Date(pubDate).getTime() : 0,
                    link: rewriteUrl(link)
                });
            });
            return posts;
        }

        async function fetchPosts() {
            if (lock) return;
            lock = true;
            const myReq = ++currentReq;

            const loading = document.getElementById('loading');
            const container = document.getElementById('postsContainer');
            const label = document.getElementById('feedLabel');
            container.innerHTML = '';

            const accounts = CUSTOM_HANDLE ? [CUSTOM_HANDLE] : AI_ACCOUNTS;
            label.textContent = CUSTOM_HANDLE
                ? `@${CUSTOM_HANDLE}`
                : `Curated tech & AI feed · ${AI_ACCOUNTS.length} accounts · via xcancel`;

            const seen = new Set();
            const allPosts = [];   // every deduped post (cache + live), for re-caching
            const range = TIME_RANGES[TIMEFRAME];
            const cutoff = range ? Date.now() - range * 1000 : null;
            let total = 0;
            let skeletonsShown = false;
            let lastPersist = 0;

            // Persist progressively (throttled) so an abandoned multi-minute load
            // still leaves a usable cache for next time.
            function persist(force) {
                if (!allPosts.length) return;
                const now = Date.now();
                if (!force && now - lastPersist < 2500) return;
                lastPersist = now;
                saveCache(key, allPosts.slice().sort((a, b) => b.date - a.date).slice(0, CACHE_MAX));
            }

            function clearSkeletons() {
                if (!skeletonsShown) return;
                container.querySelectorAll('.skeleton').forEach(n => n.remove());
                skeletonsShown = false;
            }

            // Add a post to the dataset (for caching) and render it if it's within
            // the current time window and we haven't already shown it. Cards are only
            // ever appended to the end (never inserted mid-list) so the feed never
            // shifts under the reader; once the list is full we keep caching but stop
            // rendering. Cached posts are pre-sorted, so the visible order is newest
            // first, with any genuinely new tweets appended below.
            function addPost(p) {
                if (!p.link || seen.has(p.link)) return;
                seen.add(p.link);
                allPosts.push(p);
                if (cutoff && p.date <= cutoff) return;
                if (total >= MAX_CARDS) return;
                clearSkeletons();
                container.appendChild(buildCard(p));
                total++;
            }

            function handleFeed(posts) {
                if (myReq !== currentReq) return;
                posts.forEach(addPost);
                persist(false);
                // Once anything is on screen, downgrade the spinner to a quiet pill.
                if (total > 0 && loading.style.display !== 'none' && !loading.querySelector('.refreshing')) {
                    loading.innerHTML = '<span class="refreshing"><span class="spinner"></span>Refreshing…</span>';
                }
            }

            // 1) Paint the last cached feed instantly so the user never stares at a
            //    bare spinner for a flaky multi-minute fetch. First-ever load (no
            //    cache) shows skeleton placeholders instead.
            const key = cacheKeyFor();
            const cached = loadCache(key);
            if (cached && cached.posts.length) {
                cached.posts.slice().sort((a, b) => b.date - a.date).forEach(addPost);
            }
            if (total > 0) {
                loading.style.display = 'block';
                loading.innerHTML = '<span class="refreshing"><span class="spinner"></span>Refreshing…</span>';
            } else {
                for (let i = 0; i < 6; i++) {
                    const sk = document.createElement('div');
                    sk.className = 'card skeleton';
                    sk.innerHTML = '<div class="card-header"><div class="sk-row"><div class="sk-avatar"></div>'
                        + '<div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div></div>'
                        + '<div class="sk-line"></div><div class="sk-line"></div><div class="sk-line short"></div></div>';
                    container.appendChild(sk);
                }
                skeletonsShown = true;
                loading.style.display = 'block';
                loading.innerHTML = '<div class="spinner"></div>Loading posts...';
            }

            // Cold start: establish a healthy instance on the first account alone
            // (racing all instances) so the parallel pool below can reuse it instead
            // of all stampeding the instance list at once. Its posts render now.
            let startIdx = 0;
            if (!WORKING_INSTANCE && accounts.length) {
                let firstPosts = [];
                try { firstPosts = await fetchFeed(accounts[0]); } catch (e) { /* ignore */ }
                if (myReq !== currentReq) { lock = false; return; }
                handleFeed(firstPosts);
                startIdx = 1;
            }

            // Growing-concurrency pool: launch POOL_START feeds immediately, and
            // widen the cap by one each time a feed finishes (up to POOL_MAX). Each
            // feed renders on arrival, so first paint = fastest of the opening batch.
            await new Promise(resolve => {
                let next = startIdx, active = 0, finished = startIdx, cap = POOL_START;
                function pump() {
                    if (myReq !== currentReq) { resolve(); return; }
                    if (finished >= accounts.length) { resolve(); return; }
                    while (active < cap && next < accounts.length) {
                        const acct = accounts[next++];
                        active++;
                        fetchFeed(acct)
                            .catch(() => [])
                            .then(posts => {
                                handleFeed(posts);
                                active--; finished++;
                                cap = Math.min(POOL_MAX, cap + 1);
                                if (finished >= accounts.length) resolve();
                                else pump();
                            });
                    }
                }
                pump();
            });

            if (myReq !== currentReq) { lock = false; return; }
            clearSkeletons();
            loading.style.display = 'none';
            loading.innerHTML = '<div class="spinner"></div>Loading posts...';

            // Final persist for instant paint next time (newest first, bounded).
            // Never overwrite a good cache with nothing if this fetch came back empty.
            persist(true);

            if (total === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;padding:30px;">No posts in this time range.<br><span style="font-size:0.85em;">(xcancel or the proxy may be rate-limited — try again or pick a wider range.)</span></p>';
            }
            lock = false;
        }

        // ---- rendering ---------------------------------------------------------

        function buildCard(post) {
            const card = document.createElement('div');
            card.classList.add('card');

            const header = document.createElement('div');
            header.classList.add('card-header');

            if (post.repostedBy) {
                const rl = document.createElement('div');
                rl.classList.add('repost-label');
                rl.innerHTML = `🔁 ${escapeHtml('@' + post.repostedBy)} reposted`;
                header.appendChild(rl);
            }

            const profileUrl = `https://x.com/${post.author}`;
            const authorLink = document.createElement('a');
            authorLink.classList.add('post-author');
            authorLink.href = profileUrl;
            authorLink.target = '_blank';
            authorLink.rel = 'noopener';
            authorLink.appendChild(buildAvatar(post));
            const info = document.createElement('div');
            info.classList.add('author-info');
            info.innerHTML = `
                <div class="author-name">${escapeHtml(post.authorName)}</div>
                <div class="author-handle">@${escapeHtml(post.author)} · ${formatTimeAgo(post.date)}</div>`;
            authorLink.appendChild(info);
            header.appendChild(authorLink);

            const body = document.createElement('div');
            body.classList.add('tweet-body');
            body.appendChild(sanitizeHtml(post.descHtml));
            header.appendChild(body);

            const stats = document.createElement('div');
            stats.classList.add('card-stats');
            stats.innerHTML = `<a class="x-link" href="${escapeHtml(post.link)}" target="_blank" rel="noopener">View on X →</a>`;
            header.appendChild(stats);

            card.appendChild(header);
            return card;
        }

        function buildAvatar(post) {
            if (post.avatar) {
                const img = document.createElement('img');
                img.classList.add('avatar');
                img.src = post.avatar;
                img.loading = 'lazy';
                img.alt = '';
                img.onerror = function () { this.replaceWith(monogram(post.author)); };
                return img;
            }
            return monogram(post.author);
        }

        function monogram(handle) {
            const div = document.createElement('div');
            div.classList.add('avatar', 'avatar-mono');
            let h = 0;
            for (let i = 0; i < handle.length; i++) h = (h * 31 + handle.charCodeAt(i)) >>> 0;
            div.style.backgroundColor = MONO_COLORS[h % MONO_COLORS.length];
            div.textContent = (handle[0] || '?');
            return div;
        }

        // Rebuild the RSS description into a safe DOM fragment (whitelist of tags),
        // rewriting xcancel links to x.com and dropping scripts/handlers.
        const ALLOWED = new Set(['P', 'BR', 'A', 'B', 'I', 'EM', 'STRONG', 'BLOCKQUOTE', 'IMG', 'HR', 'CITE', 'FOOTER', 'UL', 'OL', 'LI', 'SPAN']);

        function sanitizeHtml(html) {
            const parsed = new DOMParser().parseFromString(html, 'text/html');
            const frag = document.createDocumentFragment();
            for (const node of Array.from(parsed.body.childNodes)) {
                const clean = cleanNode(node);
                if (clean) frag.appendChild(clean);
            }
            return frag;
        }

        function cleanNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                return document.createTextNode(node.textContent);
            }
            if (node.nodeType !== Node.ELEMENT_NODE) return null;
            if (!ALLOWED.has(node.tagName)) {
                // Drop the tag but keep its (cleaned) children inline.
                const frag = document.createDocumentFragment();
                for (const child of Array.from(node.childNodes)) {
                    const c = cleanNode(child);
                    if (c) frag.appendChild(c);
                }
                return frag;
            }
            const el = document.createElement(node.tagName.toLowerCase());
            if (node.tagName === 'A') {
                const href = rewriteUrl(node.getAttribute('href') || '');
                if (href) { el.setAttribute('href', href); el.target = '_blank'; el.rel = 'noopener'; }
            } else if (node.tagName === 'IMG') {
                const src = node.getAttribute('src') || '';
                if (/^https?:\/\//.test(src)) { el.setAttribute('src', src); el.loading = 'lazy'; el.alt = node.getAttribute('alt') || ''; }
            }
            for (const child of Array.from(node.childNodes)) {
                const c = cleanNode(child);
                if (c) el.appendChild(c);
            }
            return el;
        }

        function rewriteUrl(url) {
            if (!url) return '';
            let out = url;
            for (const host of INSTANCE_HOSTS) {
                const re = new RegExp('^https?://(?:rss\\.)?' + host.replace(/\./g, '\\.'), 'i');
                out = out.replace(re, 'https://x.com');
            }
            return out.replace(/#m$/, '');
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return '';
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
            if (seconds < 2592000) return `${Math.floor(seconds / 604800)}w ago`;
            if (seconds < 31536000) return `${Math.floor(seconds / 2592000)}mo ago`;
            return `${Math.floor(seconds / 31536000)}y ago`;
        }

        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
    </script>
</body>
</html>
