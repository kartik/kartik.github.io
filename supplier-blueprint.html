<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon"
    href="https://ridecell.com/wp-content/themes/ridecell2017/favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <title>Ridecell Supplier Intelligence Hub</title>
  <!-- Include Cytoscape.js library -->
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Styles remain the same */
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }
    .header {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .header .highlight {
      font-weight: bold;
      color: #3d76e9;
    }
    .summary {
      font-size: 14px;
      margin-bottom: 20px;
      padding: 20px;
    }
    .summary span {
      display: inline-block;
      background-color: #d4f5d1;
      color: #4caf50;
      padding: 5px 10px;
      margin-right: 10px;
      border-radius: 5px;
    }
    .summary span.unusual {
      background-color: #ffe6e6;
      color: #f44336;
    }
    .filters {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background-color: #fff;
      border-bottom: 1px solid #eaeaea;
    }
    .filters label {
      margin-right: 10px;
      font-weight: bold;
    }
    .filters select {
      margin-right: 20px;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
    }
    .filters select:focus {
      outline: none;
      border-color: #3d76e9;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 0px 20px;
      padding-bottom: 20px;
    }
    .metric-card {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .metric-header {
      font-size: 16px;
      margin-bottom: 10px;
      position: relative;
    }
    .metric-header .normal {
      background-color: #3d76e9;
      color: white;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 5px;
      position: absolute;
      right: 0;
      top: 0;
    }
    .metric-header .unusual {
      background-color: #f44336;
      color: white;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 5px;
      position: absolute;
      right: 0;
      top: 0;
    }
    .metric-value {
      font-size: 28px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .metric-change {
      color: #4caf50;
      margin-bottom: 15px;
    }
    .chart-container {
      width: 100%;
      height: 200px;
    }
    .metric-info {
      font-size: 15px;
      color: #777;
      padding-top: 10px;
    }
    .navbar-container {
      box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.1);
      z-index: 4;
      position: relative;
    }
    .container {
      display: flex;
      width: 100%;
      height: calc(100% - 50px);
    }
    #tabs {
      width: 78px;
      flex-shrink: 0;
      box-shadow: 2px 0px 2px rgba(0, 0, 0, 0.1);
      z-index: 3;
      background: white;
    }
    #content-container {
      flex-grow: 1;
      display: inline-block;
    }

    /* subnav Styling */
    .subnav {
        display: flex;
        align-items: center;
        background-color: #ffffff;
        border-bottom: 1px solid #e0e0e0;
    }

    .nav-item {
        font-size: 14px;
        color: #666666;
        cursor: pointer;
        padding: 20px;
        text-decoration: none;
    }

    .nav-item.logo {
        font-weight: bold;
        color: #000000;
        font-size: 22px;
    }

    .nav-item.active {
        color: #000000;
        border-bottom: 4px solid #4CAF50; /* Green underline for active state */
        background-color: hsl(105deg 35.29% 93.33%);
        padding: 30px 20px 24px;
    }

    .link {
        text-decoration: none;
        color: #22aaff;
    }

    #side-panel {
      width: 200px;
      background-color: #fff;
      padding: 20px;
      border-right: 1px solid #ddd;
      height: 100vh;
      overflow-y: auto;
      position: fixed;
      left: 78px;
      top: 137px;
    }

    #side-panel .filter-group {
      margin-bottom: 20px;
    }

    #side-panel .filter-group strong {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
    }

    #side-panel .filter-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    #main-container {
      margin-left: 200px;
      width: calc(100% - 200px);
      overflow: hidden;
      position: relative;
      height: 100vh;
      background-color: #eaeaea;
    }

    #cy {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: #f4f4f9;
      cursor: grab;
    }

    #popup {
      position: fixed;
      top: 0;
      right: -1040px;
      width: 1000px;
      height: 100%;
      background-color: #fff;
      border-left: 1px solid #ddd;
      overflow-y: auto;
      transition: right 0.3s ease;
      padding: 20px;
      z-index: 1000;
      box-shadow: -2px 0 4px rgba(0, 0, 0, 0.1);
    }

    #popup.visible {
      right: 0;
    }

    /* Popup content styles */
    #popup h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    #popup table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    #popup th, #popup td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    #popup th {
      background-color: #f9fafb;
    }

    #popup .health {
      width: 15px;
      height: 15px;
      display: inline-block;
      border-radius: 50%;
    }

    #popup button {
      padding: 10px 20px;
      background-color: #0073e6;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #popup button:hover {
      background-color: #005bb5;
    }

    /* Instructions */
    #instructions {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="navbar-container">
    <img id="navbar" src="../navbar.png" style="width:100%; display: block;">
  </div>
  <div class="container">
    <div id="tabs">
      <img src="../tabs.png" style="width: 78px;">
    </div>
    <div id="content-container">
      <div class="subnav">
        <div class="nav-item logo">Supplier Intelligence</div>
        <a class="nav-item active">Blueprint</a>
        <a class="nav-item" href="supplier-spend.html">Spend</a>
        <a class="nav-item" href="supplier-perf.html">Performance</a>
      </div>
  
      <div id="side-panel">
        <div class="filter-group">
          <strong>Countries</strong>
          <label><input type="checkbox" name="country" value="US" checked>🇺🇸 United States</label>
          <label><input type="checkbox" name="country" value="Canada" checked>🇨🇦 Canada</label>
          <label><input type="checkbox" name="country" value="Mexico" checked>🇲🇽 Mexico</label>
          <label><input type="checkbox" name="country" value="Australia" checked>🇦🇺 Australia</label>
          <label><input type="checkbox" name="country" value="New Zealand" checked>🇳🇿 New Zealand</label>
        </div>
        <div class="filter-group">
          <strong>Supplier Categories</strong>
          <label><input type="checkbox" name="supplierType" value="OEM" checked>🚗 OEM</label>
          <label><input type="checkbox" name="supplierType" value="Title and Registration" checked>📃 Title and Registration</label>
          <label><input type="checkbox" name="supplierType" value="Transportation" checked>🚚 Transportation</label>
          <label><input type="checkbox" name="supplierType" value="Storage" checked>🅿️ Storage</label>
          <label><input type="checkbox" name="supplierType" value="Inspection" checked>🔍 Inspection</label>
          <label><input type="checkbox" name="supplierType" value="Upfit" checked>🔼 Upfit</label>
          <label><input type="checkbox" name="supplierType" value="Repair" checked>🔧 Repair</label>
          <label><input type="checkbox" name="supplierType" value="Resale" checked>⚖️ Resale</label>
        </div>
      </div>

      <div id="main-container">
        <div id="cy"></div>
      </div>

      <div id="popup" class="hidden"></div>

      <div id="instructions">Use scroll to zoom in/out. Drag to pan around the canvas.</div>

      <script>
        // Supplier data and functions
        var lifecycleStages = [
          'Onboarding',
          'Contract Negotiation',
          'Compliance Verification',
          'Active Service',
          'Performance Evaluation',
          'Renewal',
          'Termination',
          'De-boarding',
        ];

        var suppliersData = [
          // Sample suppliers with realistic names and data
          // Onboarding
          {
            supplier: 'Johnson Motors',
            stage: 'Onboarding',
            country: 'US',
            supplierType: 'OEM',
            startOfContract: '2022-01-15',
            endOfContract: '2025-01-15',
            staffContact: 'Michael Thompson',
            supplierContact: 'Emily Davis',
            fixedYearlyCosts: '$150,000',
            slaPerformance: 'Green',
            health: 'Green',
            trend: 'Up',
          },
          {
            supplier: 'Auto Parts Inc.',
            stage: 'Onboarding',
            country: 'Canada',
            supplierType: 'Repair',
            startOfContract: '2021-05-10',
            endOfContract: '2024-05-10',
            staffContact: 'Sarah Johnson',
            supplierContact: 'David Wilson',
            fixedYearlyCosts: '$120,000',
            slaPerformance: 'Yellow',
            health: 'Red',
            trend: 'Down',
          },
          // ... Add more suppliers to increase counts
        ];

        function generateAdditionalSuppliers() {
          var supplierNames = ['Global Upfitters', 'Elite Repairs', 'Metro Resale', 'Fleet Services', 'Auto Registrations', 'Fast Transport', 'Secure Storage', 'Precision Inspection'];
          var staffNames = ['James Anderson', 'Patricia Miller', 'Robert Garcia', 'Linda Rodriguez', 'Thomas Lee', 'Barbara Harris', 'Steven Clark', 'Elizabeth Lewis'];
          var supplierContacts = ['Anthony Walker', 'Jennifer Hall', 'Christopher Young', 'Amanda King', 'Matthew Wright', 'Jessica Scott', 'Daniel Adams', 'Karen Baker'];
          var countries = ['US', 'Canada', 'Mexico', 'Australia', 'New Zealand'];
          var supplierTypes = ['OEM', 'Title and Registration', 'Transportation', 'Storage', 'Inspection', 'Upfit', 'Repair', 'Resale'];
          var slaPerformances = ['Green', 'Yellow', 'Red'];
          var healthStatuses = ['Green', 'Red'];
          var trends = ['Up', 'Down'];

          lifecycleStages.forEach(function(stage) {
            var count = Math.floor(Math.random() * 5) + 10; // Random count between 10 and 14
            for (var i = 0; i < count; i++) {
              var supplier = {
                supplier: supplierNames[Math.floor(Math.random() * supplierNames.length)] + ' ' + (i + 1),
                stage: stage,
                country: countries[Math.floor(Math.random() * countries.length)],
                supplierType: supplierTypes[Math.floor(Math.random() * supplierTypes.length)],
                startOfContract: '2021-01-01',
                endOfContract: '2024-01-01',
                staffContact: staffNames[Math.floor(Math.random() * staffNames.length)],
                supplierContact: supplierContacts[Math.floor(Math.random() * supplierContacts.length)],
                fixedYearlyCosts: '$' + (Math.floor(Math.random() * 90) + 10) + ',000',
                slaPerformance: slaPerformances[Math.floor(Math.random() * slaPerformances.length)],
                health: healthStatuses[Math.floor(Math.random() * healthStatuses.length)],
                trend: trends[Math.floor(Math.random() * trends.length)],
              };
              suppliersData.push(supplier);
            }
          });
        }

        generateAdditionalSuppliers();

        function filterSuppliers() {
          var selectedCountries = Array.from(document.querySelectorAll('input[name="country"]:checked')).map(function(input) {
            return input.value;
          });
          var selectedSupplierTypes = Array.from(document.querySelectorAll('input[name="supplierType"]:checked')).map(function(input) {
            return input.value;
          });

          return suppliersData.filter(function(supplier) {
            return selectedCountries.includes(supplier.country) && selectedSupplierTypes.includes(supplier.supplierType);
          });
        }

        function getNumSuppliers(stage) {
          var filteredSuppliers = filterSuppliers();
          return filteredSuppliers.filter(function(supplier) {
            return supplier.stage === stage;
          }).length;
        }

        function getAggregateSlaPerformance(stage) {
          var filteredSuppliers = filterSuppliers();
          var suppliersInStage = filteredSuppliers.filter(function(supplier) {
            return supplier.stage === stage;
          });
          var slaCounts = { Green: 0, Yellow: 0, Red: 0 };
          suppliersInStage.forEach(function(supplier) {
            slaCounts[supplier.slaPerformance]++;
          });

          if (slaCounts.Red >= slaCounts.Green && slaCounts.Red >= slaCounts.Yellow) {
            return 'Red';
          } else if (slaCounts.Yellow >= slaCounts.Green && slaCounts.Yellow >= slaCounts.Red) {
            return 'Yellow';
          } else {
            return 'Green';
          }
        }

        function getTrend(stage) {
          var filteredSuppliers = filterSuppliers();
          var suppliersInStage = filteredSuppliers.filter(function(supplier) {
            return supplier.stage === stage;
          });
          var trendCounts = { Up: 0, Down: 0 };
          suppliersInStage.forEach(function(supplier) {
            trendCounts[supplier.trend]++;
          });
          return trendCounts.Down > trendCounts.Up ? 'Down' : 'Up';
        }

        var cy;

        function initializeCytoscape() {
          cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
              {
                selector: 'node',
                style: {
                  'shape': 'roundrectangle',
                  'width': 220,
                  'height': 100,
                  'background-color': '#fff',
                  'border-width': 5,
                  'border-color': '#ddd',
                  'label': 'data(label)',
                  'text-valign': 'center',
                  'text-halign': 'center',
                  'font-size': 14,
                  'color': '#333',
                  'text-wrap': 'wrap',
                  'text-max-width': 200,
                  'font-weight': 'bold',
                }
              },
              {
                selector: 'edge',
                style: {
                  'width': 2,
                  'line-color': '#0073e6',
                  'target-arrow-color': '#0073e6',
                  'target-arrow-shape': 'triangle',
                  'curve-style': 'bezier',
                }
              },
              {
                selector: 'node[aggregateSla = "Green"]',
                style: {
                  'border-color': 'green',
                }
              },
              {
                selector: 'node[aggregateSla = "Yellow"]',
                style: {
                  'border-color': 'gold',
                }
              },
              {
                selector: 'node[aggregateSla = "Red"]',
                style: {
                  'border-color': 'red',
                }
              }
            ],
            layout: {
              name: 'preset'
            }
          });

          updateGraph();

          // Enable panning and zooming
          cy.userZoomingEnabled(true);
          cy.userPanningEnabled(true);

          // Add event listener for node clicks
          cy.on('tap', 'node', function(evt) {
            var node = evt.target;
            var stage = node.data('stage');
            showPopup(stage);
          });
        }

        function updateGraph() {
          var elements = [];
          var xCenter = cy.width() / 2;
          var yPosition = 0;
          var xLeft = xCenter - 150;
          var xRight = xCenter + 150;

          var stageToNodeId = {};

          var positions = {
            'Onboarding': { x: xCenter, y: yPosition },
            'Contract Negotiation': { x: xCenter, y: yPosition += 150 },
            'Compliance Verification': { x: xCenter, y: yPosition += 150 },
            'Active Service': { x: xCenter, y: yPosition += 150 },
            'Performance Evaluation': { x: xCenter, y: yPosition += 150 },
            'Renewal': { x: xLeft, y: yPosition += 150 },
            'Termination': { x: xRight, y: yPosition },
            'De-boarding': { x: xRight, y: yPosition += 150 },
          };

          lifecycleStages.forEach(function(stage, index) {
            var numSuppliers = getNumSuppliers(stage);
            var aggregateSla = getAggregateSlaPerformance(stage);
            var trend = getTrend(stage);
            var trendSymbol = trend === 'Up' ? '⬆️' : '⬇️';

            var label = `${stage}\nSuppliers: ${numSuppliers}\n ${trendSymbol}`;

            elements.push({
              data: { id: 'node' + index, label: label, stage: stage, aggregateSla: aggregateSla, trend: trend },
              position: positions[stage],
            });

            stageToNodeId[stage] = 'node' + index;
          });

          // Define edges
          var edges = [
            { source: 'Onboarding', target: 'Contract Negotiation' },
            { source: 'Contract Negotiation', target: 'Compliance Verification' },
            { source: 'Compliance Verification', target: 'Active Service' },
            { source: 'Active Service', target: 'Performance Evaluation' },
            { source: 'Performance Evaluation', target: 'Renewal' },
            { source: 'Performance Evaluation', target: 'Termination' },
            { source: 'Renewal', target: 'Active Service' },
            { source: 'Termination', target: 'De-boarding' },
          ];

          edges.forEach(function(edge) {
            elements.push({
              data: {
                source: stageToNodeId[edge.source],
                target: stageToNodeId[edge.target],
              }
            });
          });

          cy.elements().remove();
          cy.add(elements);

          cy.fit();

          // Improve styling after elements are added
          cy.style()
            .selector('node')
            .style({
              'overlay-padding': '6px',
              'overlay-opacity': 0,
            })
            .update();

          cy.nodes().forEach(function(node) {
            var trend = node.data('trend');
            var trendSymbol = trend === 'Up' ? '⬆️' : '⬇️';
            var label = node.data('label');
            node.data('label', label.replace(/Trend: .*/, `Trend: ${trendSymbol}`));
          });
        }

        function showPopup(stage) {
          var popup = document.getElementById('popup');
          var suppliersInStage = filterSuppliers().filter(function(supplier) {
            return supplier.stage === stage;
          });

          var tableRows = suppliersInStage.map(function(supplier) {
            return `
              <tr>
                <td>${supplier.supplier}</td>
                <td>${supplier.startOfContract}</td>
                <td>${supplier.staffContact}</td>
                <td>${supplier.supplierContact}</td>
                <td>${supplier.endOfContract}</td>
                <td>${supplier.fixedYearlyCosts}</td>
                <td>
                  <span class="health" style="background-color: ${supplier.slaPerformance === 'Green' ? 'green' : (supplier.slaPerformance === 'Yellow' ? 'gold' : 'red')}"></span>
                </td>
              </tr>
            `;
          }).join('');

          popup.innerHTML = `
            <h2>Suppliers in ${stage}</h2>
            <table>
              <tr>
                <th>Supplier</th>
                <th>Start of Contract</th>
                <th>Staff Contact</th>
                <th>Supplier Contact</th>
                <th>End of Contract</th>
                <th>Fixed Yearly Costs</th>
                <th>SLA/Health</th>
              </tr>
              ${tableRows}
            </table>
            <button onclick="closePopup()">Close</button>
          `;

          popup.classList.add('visible');
        }

        function closePopup() {
          var popup = document.getElementById('popup');
          popup.classList.remove('visible');
        }

        // Event listeners for filters
        var filterInputs = document.querySelectorAll('#side-panel input');
        filterInputs.forEach(function(input) {
          input.addEventListener('change', function() {
            updateGraph();
          });
        });

        // Initialize Cytoscape when the page loads
        window.onload = function() {
          initializeCytoscape();
        };
      </script>
  

    </div>
  </div>

</body>
</html>
