<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon"
    href="https://ridecell.com/wp-content/themes/ridecell2017/favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="chatbot.css">
  <title>Ridecell Supplier Intelligence Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }
    .header {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .header .highlight {
      font-weight: bold;
      color: #3d76e9;
    }
    .summary {
      font-size: 14px;
      padding: 20px;
    }
    .summary span {
      display: inline-block;
      background-color: #d4f5d1;
      color: #4caf50;
      padding: 5px 10px;
      margin-right: 10px;
      border-radius: 5px;
    }
    .summary span.unusual {
      background-color: #ffe6e6;
      color: #f44336;
    }
    .filters {
      padding: 15px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: #fafafa;
      border-bottom: 2px solid #eaeaea;
    }
    .filters label {
      margin-right: 10px;
      font-weight: bold;
    }
    .filters select {
      margin-right: 20px;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
    }
    .filters select:focus {
      outline: none;
      border-color: #3d76e9;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 0px 20px;
      padding-bottom: 20px;
    }
    .metrics h2{
      font-size: 20px;
      margin-bottom: 0px;
    }  
    .metric-card {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .metric-header {
      margin-top: 0px;
      position: relative;
      font-weight: normal;
    }
    .metric-header .normal {
      background-color: #d4f5d1;
      color: #4caf50;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 5px;
      position: absolute;
      right: 0;
      top: 0;
    }
    .metric-header .unusual {
      background-color: #f44336;
      color: white;
      padding: 3px 6px;
      font-size: 12px;
      border-radius: 5px;
      position: absolute;
      right: 0;
      top: 0;
    }
    .metric-value {
      font-size: 28px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .metric-change {
      color: #4caf50;
      margin-bottom: 15px;
    }
    .chart-container {
      width: 100%;
      height: 200px;
    }
    .metric-info {
      font-size: 15px;
      color: #777;
      padding-top: 10px;
    }
    .navbar-container {
      box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.1);
      z-index: 4;
      position: relative;
    }
    .container {
      display: flex;
      width: 100%;
      height: calc(100% - 50px);
    }
    #tabs {
      width: 78px;
      flex-shrink: 0;
      box-shadow: 2px 0px 2px rgba(0, 0, 0, 0.1);
      z-index: 3;
      background: white;
    }
    #content-container {
      flex-grow: 1;
      display: inline-block;
    }
    .subnav {
      display: flex;
      align-items: center;
      background-color: #ffffff;
      border-bottom: 1px solid #e0e0e0;
    }
    .nav-item {
      font-size: 14px;
      color: #666666;
      cursor: pointer;
      padding: 20px;
      text-decoration: none;
    }
    .nav-item.logo {
      font-weight: bold;
      color: #000000;
      font-size: 22px;
    }
    .nav-item.active {
      color: #000000;
      border-bottom: 4px solid #4CAF50; /* Green underline for active state */
      background-color: hsl(105deg 35.29% 93.33%);
      padding: 30px 20px 24px;
    }
    .link {
      text-decoration: none;
      color: #22aaff;
    }
  </style>
</head>
<body>
  <div class="navbar-container">
    <img id="navbar" src="../navbar.png" style="width:100%; display: block;">
  </div>
  <div class="container">
    <div id="tabs">
      <img src="../tabs.png" style="width: 78px;">
    </div>
    <div id="content-container">
      <div class="subnav">
        <div class="nav-item logo">Supplier Intelligence</div>
        <a class="nav-item" href="suppliers.html">Suppliers</a>
        <a class="nav-item" href="contacts.html">Contacts</a>
        <a class="nav-item" href="supplier-spend.html">Spend</a>
        <a class="nav-item active" href="supplier-perf.html">Performance</a>
        <a class="nav-item" href="insights.html">Insights</a>
      </div>
  
      <!-- Filters -->
      <div class="filters">
        <select id="regionSelect">
          <option value="all">All Regions</option>
          <option value="north">North</option>
          <option value="south">South</option>
          <option value="east">East</option>
          <option value="west">West</option>
        </select>
  
        <select id="timeRangeSelect">
          <option value="ytd">Year to Date</option>
          <option value="q1">Q1</option>
          <option value="q2">Q2</option>
          <option value="q3">Q3</option>
          <option value="q4">Q4</option>
        </select>
  
        <select id="categorySelect">
          <option value="all">All Categories</option>
          <option value="registration">Registration</option>
          <option value="transportation">Transportation</option>
          <option value="storage">Storage</option>
          <option value="inspection">Inspection</option>
          <option value="upfit">Upfit</option>
          <option value="repair">Repair</option>
          <option value="resale">Resale</option>
        </select>
  
        <select id="supplierSelect">
          <option value="all">All Suppliers</option>
          <option value="TransMove Logistics">TransMove Logistics</option>
          <option value="SpeedyTrans Co.">SpeedyTrans Co.</option>
          <option value="QuickInspect Services">QuickInspect Services</option>
          <option value="RapidRepair Inc.">RapidRepair Inc.</option>
          <option value="SecureStorage Facilities">SecureStorage Facilities</option>
          <option value="SafeKeep Warehousing">SafeKeep Warehousing</option>
          <option value="AutoUpfit Solutions">AutoUpfit Solutions</option>
          <option value="EliteRegistration Agency">EliteRegistration Agency</option>
          <option value="QuickDocs Services">QuickDocs Services</option>
          <option value="ResaleExperts LLC">ResaleExperts LLC</option>
        </select>
      </div>
  
      <div class="summary">
        <span class="unusual">Unusual 4</span>
        <span>Normal 6</span>
      </div>
  
      <div class="metrics">
        <!-- Metrics will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Floating chat icon -->
  <div id="chat-icon" onclick="toggleChat()"><img src="robot-icon.png" style="height:80px"></div>

  <!-- Chat window -->
  <div id="chat-window">
    <div id="chat-header">
      <span>FleetCaptain</span>
      <span id="close-chat" onclick="toggleChat()">✖</span>
    </div>
    <div id="chat-messages"></div>
    <!-- Loading indicator -->
    <div id="loading-indicator">
      <div class="spinner"></div>
    </div>
    <div id="chat-input-container">
      <input type="text" id="chat-input" placeholder="Ask a question about this data..." onkeypress="handleKeyPress(event)">
      <button id="send-button" onclick="sendMessage()">➤</button>
    </div>
  </div>
  
  <script>
    // Sample data structure
    const metricsData = {
      '⏰ SLA Adherence': [
        {
          title: 'On-Time Delivery %',
          status: 'unusual',
          value: '85%',
          change: '-5% (Decreased)',
          changeColor: '#f44336',
          chartType: 'line',
          chartData: [90, 88, 85, 85],
          rootCause: 'Supplier transportation delays.',
          futurePrediction: 'May decrease by another 2% next quarter due to ongoing logistics issues.',
          category: 'transportation',
          suppliers: ['TransMove Logistics', 'SpeedyTrans Co.'],
          regions: ['north', 'south'],
          definition: 'Measures the percentage of deliveries made on time by suppliers.'
        },
        {
          title: 'SLA Violations',
          status: 'unusual',
          value: '15',
          change: '+5 Violations',
          changeColor: '#f44336',
          chartType: 'bar',
          chartData: [5, 7, 10, 15],
          rootCause: 'Suppliers not meeting quality standards.',
          futurePrediction: 'Potential increase if corrective actions are not implemented.',
          category: 'inspection',
          suppliers: ['QuickInspect Services'],
          regions: ['east', 'west'],
          definition: 'Number of times suppliers have violated Service Level Agreements.'
        },
        {
          title: 'Lead Time Compliance',
          status: 'normal',
          value: '95%',
          change: '+3% (Improved)',
          chartType: 'line',
          chartData: [90, 92, 93, 95],
          rootCause: 'Improved supplier coordination.',
          futurePrediction: 'Expected to maintain or improve.',
          category: 'transportation',
          suppliers: ['TransMove Logistics', 'SpeedyTrans Co.'],
          regions: ['north', 'south'],
          definition: 'Measures the percentage of times suppliers meet the agreed lead times.'
        }
      ],
      '✅ Quality and Compliance': [
        {
          title: 'Defect Rate',
          status: 'unusual',
          value: '7%',
          change: '+2% (Increased)',
          changeColor: '#f44336',
          chartType: 'line',
          chartData: [4, 5, 5, 7],
          rootCause: 'Inconsistent supplier quality control.',
          futurePrediction: 'May rise further without supplier audits.',
          category: 'repair',
          suppliers: ['RapidRepair Inc.'],
          regions: ['north'],
          definition: 'Percentage of supplier outputs that are defective.'
        },
        {
          title: 'Quality Audit Scores',
          status: 'normal',
          value: '88%',
          change: 'Steady (No Change)',
          chartType: 'bar',
          chartData: [85, 87, 88, 88],
          rootCause: 'Consistent supplier performance.',
          futurePrediction: 'Likely to remain stable.',
          category: 'storage',
          suppliers: ['SecureStorage Facilities', 'SafeKeep Warehousing'],
          regions: ['south'],
          definition: 'Scores from quality audits performed on suppliers.'
        },
        {
          title: 'Corrective Action Response Time',
          status: 'unusual',
          value: '48 Hours',
          change: '+12 Hours (Increased)',
          changeColor: '#f44336',
          chartType: 'line',
          chartData: [24, 30, 36, 48],
          rootCause: 'Delayed supplier responses to issues.',
          futurePrediction: 'May increase further without process improvements.',
          category: 'repair',
          suppliers: ['RapidRepair Inc.'],
          regions: ['north', 'east'],
          definition: 'Average time suppliers take to respond to corrective actions.'
        }
      ],
      '⚙️ Operational Efficiency': [
        {
          title: 'Process Automation Rate',
          status: 'normal',
          value: '65%',
          change: '+5% (Increased)',
          chartType: 'pie',
          chartData: [65, 35],
          rootCause: 'Implementation of new systems.',
          futurePrediction: 'Expected to reach 70% next quarter.',
          category: 'registration',
          suppliers: ['EliteRegistration Agency', 'QuickDocs Services'],
          regions: ['west'],
          definition: 'Percentage of supplier processes that are automated.'
        },
        {
          title: 'Lead Time Reduction',
          status: 'unusual',
          value: '2 Days',
          change: '-1 Day (Decreased)',
          changeColor: '#f44336',
          chartType: 'bar',
          chartData: [4, 3, 3, 2],
          rootCause: 'Inefficiencies in supplier processes.',
          futurePrediction: 'Could worsen if not addressed.',
          category: 'upfit',
          suppliers: ['AutoUpfit Solutions'],
          regions: ['east'],
          definition: 'Measures reduction in lead time for supplier services.'
        },
        {
          title: 'Operational Rate',
          status: 'normal',
          value: '80%',
          change: '+2% (Improved)',
          chartType: 'line',
          chartData: [75, 76, 78, 80],
          rootCause: 'Optimized supplier scheduling.',
          futurePrediction: 'Likely to improve with continued efficiency efforts.',
          category: 'repair',
          suppliers: ['RapidRepair Inc.'],
          regions: ['north', 'east'],
          definition: 'Percentage of total operational time that a supplier dedicates to a specific stage.'
        }
      ],
      '🚀 Throughput and Velocity': [
        {
          title: 'Completed Stages',
          status: 'normal',
          value: '25,046',
          change: '+5,000 (Improved)',
          chartType: 'bar',
          chartData: [15000, 18000, 20000, 25000],
          rootCause: 'Increased supplier throughput.',
          futurePrediction: 'Expected to maintain or improve.',
          category: 'resale',
          suppliers: ['ResaleExperts LLC'],
          regions: ['north', 'west'],
          definition: 'Number of processes a supplier has successfully finished within a specific period.'
        },
        {
          title: 'Average Duration',
          status: 'unusual',
          value: '5 Days',
          change: '+1 Day (Increased)',
          changeColor: '#f44336',
          chartType: 'line',
          chartData: [3, 3, 4, 5],
          rootCause: 'Delays in supplier operations.',
          futurePrediction: 'May increase further if not addressed.',
          category: 'transportation',
          suppliers: ['TransMove Logistics'],
          regions: ['east', 'south'],
          definition: 'Average time it takes for a supplier to complete the activity.'
        },
        {
          title: 'Assets per Period',
          status: 'normal',
          value: '50,662',
          change: '+5,000 (Increased)',
          chartType: 'line',
          chartData: [40000, 42000, 45000, 50000],
          rootCause: 'Supplier increased capacity.',
          futurePrediction: 'Expected to rise as demand grows.',
          category: 'storage',
          suppliers: ['SecureStorage Facilities'],
          regions: ['south', 'west'],
          definition: 'Average number of vehicles a supplier services per day for this activity.'
        }
      ]
    };
  
    // Function to render metrics
    function renderMetrics() {
      const region = document.getElementById('regionSelect').value;
      const timeRange = document.getElementById('timeRangeSelect').value;
      const selectedCategory = document.getElementById('categorySelect').value;
      const supplier = document.getElementById('supplierSelect').value;
  
      const metricsContainer = document.querySelector('.metrics');
      metricsContainer.innerHTML = '';
  
      let unusualCount = 0;
      let normalCount = 0;
  
      for (let categoryName in metricsData) {
        const metrics = metricsData[categoryName];
        let categoryMetricsAdded = false;
  
        for (let metric of metrics) {
          // Apply region filter
          if (region !== 'all' && !metric.regions.includes(region)) {
            continue;
          }
          // Apply supplier filter
          if (supplier !== 'all' && !metric.suppliers.includes(supplier)) {
            continue;
          }
          // Apply category filter
          if (selectedCategory !== 'all' && metric.category !== selectedCategory) {
            continue;
          }
          // Time range filter can be applied to chart data (not implemented here)
  
          if (!categoryMetricsAdded) {
            // Add category heading
            const categoryHeading = document.createElement('h2');
            categoryHeading.textContent = categoryName;
            categoryHeading.style.gridColumn = 'span 3';
            metricsContainer.appendChild(categoryHeading);
            categoryMetricsAdded = true;
          }
  
          // Count status
          if (metric.status === 'unusual') {
            unusualCount++;
          } else {
            normalCount++;
          }
  
          // Create metric card
          const metricCard = document.createElement('div');
          metricCard.className = 'metric-card';
  
          const metricHeader = document.createElement('h3');
          metricHeader.className = 'metric-header';
          metricHeader.textContent = metric.title;
          metricHeader.title = metric.definition; // Add tooltip
          metricCard.appendChild(metricHeader);
  
          const statusSpan = document.createElement('span');
          statusSpan.className = metric.status;
          statusSpan.textContent = metric.status.charAt(0).toUpperCase() + metric.status.slice(1);
          metricHeader.appendChild(statusSpan);
  
          const metricValue = document.createElement('div');
          metricValue.className = 'metric-value';
          metricValue.textContent = metric.value;
          if(metric.title == 'On-Time Delivery %')
              metricValue.innerHTML = '<a class="link" href="supplier-perf-on-time.html">' + metric.value + ' →' + '</a>';
          if(metric.title == 'Defect Rate')
              metricValue.innerHTML = '<a class="link" href="supplier-perf-defect-rate.html">' + metric.value + ' →' + '</a>';
          if(metric.title == 'Process Automation Rate')
              metricValue.innerHTML = '<a class="link" href="supplier-perf-automation-rate.html">' + metric.value + ' →' + '</a>';
          if(metric.title == 'Completed Stages')
              metricValue.innerHTML = '<a class="link" href="supplier-perf-completed-stages.html">' + metric.value + ' →' + '</a>';
          metricCard.appendChild(metricValue);
  
          const metricChange = document.createElement('div');
          metricChange.className = 'metric-change';
          metricChange.textContent = metric.change;
          if (metric.changeColor) {
            metricChange.style.color = metric.changeColor;
          }
          metricCard.appendChild(metricChange);
  
          const chartContainer = document.createElement('div');
          chartContainer.className = 'chart-container';
          const canvas = document.createElement('canvas');
          chartContainer.appendChild(canvas);
          metricCard.appendChild(chartContainer);
  
          const metricInfo = document.createElement('div');
          metricInfo.className = 'metric-info';
          metricInfo.innerHTML = metric.rootCause
            ? `<strong>Root Cause:</strong> ${metric.rootCause}<br><strong>Future Prediction:</strong> ${metric.futurePrediction}`
            : '';
          metricCard.appendChild(metricInfo);
  
          metricsContainer.appendChild(metricCard);
  
          // Create chart
          let chartOptions = { scales: { y: { beginAtZero: true } } };
          let chartData;
  
          // Check if chartData is an object with labels and datasets
          if (metric.chartData && metric.chartData.labels && metric.chartData.datasets) {
            chartData = metric.chartData;
          } else if (Array.isArray(metric.chartData)) {
            chartData = {
              labels: ['Q1', 'Q2', 'Q3', 'Q4'],
              datasets: [{
                label: metric.title,
                data: metric.chartData,
                borderColor: metric.status === 'unusual' ? 'red' : 'green',
                backgroundColor: metric.status === 'unusual' ? 'red' : 'green',
                fill: metric.chartType !== 'line'
              }]
            };
          } else {
            // For charts like scatter that have a different data structure
            chartData = metric.chartData;
          }
  
          if (metric.chartType === 'pie' || metric.chartType === 'doughnut') {
            chartData = {
              labels: ['Automated', 'Manual'],
              datasets: [{
                label: metric.title,
                data: metric.chartData,
                backgroundColor: ['green', 'lightgrey']
              }]
            };
            chartOptions = {};
          }
  
          if (metric.chartType === 'horizontalBar') {
            chartOptions = {
              indexAxis: 'y',
              scales: {
                x: { beginAtZero: true }
              }
            };
          }
  
          if (metric.chartType === 'scatter') {
            chartOptions = {
              scales: {
                x: {
                  type: 'category',
                  labels: ['Q1', 'Q2', 'Q3', 'Q4']
                },
                y: { beginAtZero: true }
              }
            };
          }
  
          if (metric.chartType === 'stackedBar') {
            chartOptions = {
              scales: {
                x: { stacked: true },
                y: { stacked: true, beginAtZero: true }
              }
            };
          }
  
          new Chart(canvas.getContext('2d'), {
            type: metric.chartType === 'horizontalBar' ? 'bar' : metric.chartType,
            data: chartData,
            options: chartOptions
          });
        }
      }
  
      // Update summary counts
      document.querySelector('.summary .unusual').textContent = `Unusual ${unusualCount}`;
      document.querySelector('.summary span:not(.unusual)').textContent = `Normal ${normalCount}`;
    }
  
    // Add event listeners to filters
    document.getElementById('regionSelect').addEventListener('change', renderMetrics);
    document.getElementById('timeRangeSelect').addEventListener('change', renderMetrics);
    document.getElementById('categorySelect').addEventListener('change', renderMetrics);
    document.getElementById('supplierSelect').addEventListener('change', renderMetrics);
  
    // Initial rendering
    renderMetrics();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
