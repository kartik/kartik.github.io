  <script>
    const contactFirstNames = ['John', 'Jane', 'Bob', 'Alice', 'Michael', 'Linda', 'William', 'Elizabeth', 'David', 'Jennifer'];
    const contactLastNames = ['Doe', 'Smith', 'Johnson', 'Williams', 'Brown', 'Davis', 'Miller', 'Wilson', 'Moore', 'Taylor'];

    function generateRandomData() {
      const transactions = [];
      const dateRangeStart = new Date('2024-01-01');
      const dateRangeEnd = new Date('2024-11-15');

      // Generate 30 invoices
      const totalInvoiceAmount = 120500000;
      const totalUnitsOrdered = 15250;
      let invoiceAmountRemaining = totalInvoiceAmount;
      let unitsRemaining = totalUnitsOrdered;
      const invoiceStatuses = ['Paid', 'Pending', 'Refunded'];
      const invoiceSubTypes = ['Units', 'Parts'];

      for (let i = 0; i < 30; i++) {
        const transaction = {};
        transaction.transactionId = 'INV' + (10000 + i);

        // Dates
        const timeDiff = dateRangeEnd.getTime() - dateRangeStart.getTime();
        const randomTime = dateRangeStart.getTime() + (i / 30) * timeDiff;
        transaction.transactionDate = new Date(randomTime);
        transaction.dueDate = new Date(transaction.transactionDate);
        transaction.dueDate.setDate(transaction.transactionDate.getDate() + 30);

        // Transaction details
        transaction.transactionType = 'Invoice';
        transaction.status = 'Paid'; // All invoices are 'Paid' to sum up to total amount

        // Alternate between 'Units' and 'Parts' for subtype
        transaction.transactionSubType = i < 25 ? 'Units' : 'Parts';

        if (transaction.transactionSubType === 'Units') {
          let units;
          if (i < 24) {
            units = Math.floor(totalUnitsOrdered / 25);
            unitsRemaining -= units;
          } else {
            units = unitsRemaining; // Assign remaining units to last transaction
          }
          transaction.units = units;
        } else {
          transaction.units = '';
        }

        let amount;
        if (i < 29) {
          amount = Math.floor(totalInvoiceAmount / 30);
          invoiceAmountRemaining -= amount;
        } else {
          amount = invoiceAmountRemaining; // Assign remaining amount to last transaction
        }
        transaction.amount = amount;

        // Supplier Contact
        const firstName = contactFirstNames[i % contactFirstNames.length];
        const lastName = contactLastNames[i % contactLastNames.length];
        transaction.supplierContact = `${firstName} ${lastName}`;

        transactions.push(transaction);
      }

      // Generate 20 incentives
      const totalIncentiveAmount = 24100000;
      const incentiveStatuses = ['Reconciled', 'Missing'];
      let incentiveAmountRemaining = totalIncentiveAmount;

      for (let i = 0; i < 20; i++) {
        const transaction = {};
        transaction.transactionId = 'INC' + (20000 + i);

        // Dates
        const timeDiff = dateRangeEnd.getTime() - dateRangeStart.getTime();
        const randomTime = dateRangeStart.getTime() + (i / 20) * timeDiff;
        transaction.transactionDate = new Date(randomTime);
        transaction.dueDate = new Date(transaction.transactionDate);
        transaction.dueDate.setDate(transaction.transactionDate.getDate() + 30);

        // Transaction details
        transaction.transactionType = 'Incentive';
        transaction.transactionSubType = 'Units';
        transaction.units = '';

        // First 5 incentives are 'Missing', rest are 'Reconciled'
        if (i < 5) {
          transaction.status = 'Missing';
          transaction.amount = Math.floor(6025000 / 5);
          incentiveAmountRemaining -= transaction.amount;
        } else if (i < 19) {
          transaction.status = 'Reconciled';
          transaction.amount = Math.floor((totalIncentiveAmount - 6025000) / 14);
          incentiveAmountRemaining -= transaction.amount;
        } else {
          transaction.status = 'Reconciled';
          transaction.amount = incentiveAmountRemaining; // Assign remaining amount to last transaction
        }

        // Supplier Contact
        const firstName = contactFirstNames[(i + 30) % contactFirstNames.length];
        const lastName = contactLastNames[(i + 30) % contactLastNames.length];
        transaction.supplierContact = `${firstName} ${lastName}`;

        transactions.push(transaction);
      }

      // Sort transactions by transactionDate descending
      transactions.sort((a, b) => b.transactionDate - a.transactionDate);

      return transactions;
    }

    const transactionsData = generateRandomData();

    // Handle query parameters for filters
    function getQueryParams() {
      const params = {};
      window.location.search.substring(1).split('&').forEach(function(pair) {
        const [key, value] = pair.split('=');
        if (key && value) {
          params[decodeURIComponent(key)] = decodeURIComponent(value).split(',');
        }
      });
      return params;
    }

    const queryParams = getQueryParams();

    // Apply filters
function applyFilters() {
  let filteredTransactions = transactionsData.slice();

  // Apply filters based on the current state of checkboxes
  const selectedTransactionTypes = Array.from(document.querySelectorAll('input[name="transactionType"]:checked')).map(i => i.value);
  if (selectedTransactionTypes.length > 0) {
    filteredTransactions = filteredTransactions.filter(t => selectedTransactionTypes.includes(t.transactionType));
  }

  const selectedTransactionSubTypes = Array.from(document.querySelectorAll('input[name="transactionSubType"]:checked')).map(i => i.value);
  if (selectedTransactionSubTypes.length > 0) {
    filteredTransactions = filteredTransactions.filter(t => selectedTransactionSubTypes.includes(t.transactionSubType));
  }

  const selectedInvoiceStatuses = Array.from(document.querySelectorAll('input[name="invoiceStatus"]:checked')).map(i => i.value);
  if (selectedInvoiceStatuses.length > 0) {
    filteredTransactions = filteredTransactions.filter(t => {
      if (t.transactionType === 'Invoice') {
        return selectedInvoiceStatuses.includes(t.status);
      }
      return true;
    });
  }

  const selectedIncentiveReconciliations = Array.from(document.querySelectorAll('input[name="incentiveReconciliation"]:checked')).map(i => i.value);
  if (selectedIncentiveReconciliations.length > 0) {
    filteredTransactions = filteredTransactions.filter(t => {
      if (t.transactionType === 'Incentive') {
        return selectedIncentiveReconciliations.includes(t.status);
      }
      return true;
    });
  }

  return filteredTransactions;
}


    // Render filter badges
    function renderFilterBadges() {
      const filterBadgesContainer = document.getElementById('filter-badges');
      filterBadgesContainer.innerHTML = '';
      const filters = ['transactionType', 'transactionSubType', 'invoiceStatus', 'incentiveReconciliation'];
      filters.forEach(filter => {
        const selectedOptions = Array.from(document.querySelectorAll(`input[name="${filter}"]:checked`)).map(i => i.value);
        selectedOptions.forEach(option => {
          const badge = document.createElement('div');
          badge.className = 'filter-badge';
          badge.textContent = `${filter}: ${option}`;
          filterBadgesContainer.appendChild(badge);
        });
      });
    }

    // Render statistics
    function renderStatistics(filteredTransactions) {
      const totalTransactions = filteredTransactions.length;
      const totalUnits = filteredTransactions.reduce((sum, t) => sum + (t.units ? t.units : 0), 0);
      const totalInvoicedAmount = filteredTransactions.filter(t => t.transactionType === 'Invoice').reduce((sum, t) => sum + t.amount, 0);
      const totalIncentiveAmount = filteredTransactions.filter(t => t.transactionType === 'Incentive').reduce((sum, t) => sum + t.amount, 0);

      document.getElementById('total-transactions').textContent = totalTransactions;
      document.getElementById('total-units').textContent = totalUnits;
      document.getElementById('total-invoiced-amount').textContent = '$' + totalInvoicedAmount.toLocaleString();
      document.getElementById('total-incentive-amount').textContent = '$' + totalIncentiveAmount.toLocaleString();
    }

    // Render table
    function renderTable() {
      const filteredTransactions = applyFilters();
      //renderFilterBadges();
      renderStatistics(filteredTransactions);

      const tableContainer = document.getElementById('table-container');

      const tableRows = filteredTransactions.map(function(transaction) {
        const statusColors = {
          'Paid': '#4caf50',
          'Pending': '#ff9800',
          'Refunded': '#f44336',
          'Reconciled': '#4caf50',
          'Missing': '#f44336'
        };

        const statusColor = statusColors[transaction.status] || '#000000';

        return `<tr>
          <td>${transaction.transactionId}</td>
          <td>${transaction.transactionDate.toISOString().split('T')[0]}</td>
          <td>${transaction.dueDate.toISOString().split('T')[0]}</td>
          <td>${transaction.transactionType}</td>
          <td><span class="status-chip" style="background-color: ${statusColor};">${transaction.status}</span></td>
          <td>$${transaction.amount.toLocaleString()}</td>
          <td><a href="#">${transaction.supplierContact}</a></td>
          <td><a href="#" class="view-more" data-id="${transaction.transactionId}">View More</a></td>
        </tr>`;
      }).join('');

      const tableHTML = `<table>
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Transaction Date</th>
            <th>Due Date</th>
            <th>Transaction Type</th>
            <th>Status</th>
            <th>Amount</th>
            <th>Supplier Contact</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
        </tbody>
      </table>`;

      tableContainer.innerHTML = tableHTML;

      // Add event listeners to "View More" links
      const viewMoreLinks = document.querySelectorAll('.view-more');
      viewMoreLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const transactionId = this.getAttribute('data-id');
          const transaction = transactionsData.find(t => t.transactionId === transactionId);
          openModal(transaction);
        });
      });
    }

    // Event listeners for filters
const filterInputs = document.querySelectorAll('#side-panel input');
filterInputs.forEach(function(input) {
  input.addEventListener('change', function() {
    renderTable();
  });
});

    // Initialize Table when the page loads
window.onload = function() {
  // Set checkboxes based on query parameters
  for (let param in queryParams) {
    queryParams[param].forEach(value => {
      const formattedValue = value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
      const checkbox = document.querySelector(`input[name="${param}"][value="${formattedValue}"]`);
      if (checkbox) {
        checkbox.checked = true;
      }
    });
  }
  renderTable();
};

    // Modal functionality
    const modal = document.getElementById('modal');
    const closeModalBtn = document.getElementById('close-modal');

    function openModal(transaction) {
      const modalContent = document.getElementById('modal-content');

      // Generate line item details that do not change between page refreshes
      function generateLineItems(transactionId) {
        const lineItems = [];
        const numItems = 3;
        for (let i = 1; i <= numItems; i++) {
          const item = {
            description: `Item ${i} for ${transactionId}`,
            quantity: Math.floor(Math.random() * 10) + 1,
            price: (Math.random() * 1000 + 100).toFixed(2)
          };
          lineItems.push(item);
        }
        return lineItems;
      }

      const lineItems = generateLineItems(transaction.transactionId);

      const lineItemsHTML = lineItems.map(item => `
        <li>
          <strong>Description:</strong> ${item.description},
          <strong>Quantity:</strong> ${item.quantity},
          <strong>Price:</strong> $${item.price}
        </li>
      `).join('');

      modalContent.innerHTML = `
        <p><strong>Transaction ID:</strong> ${transaction.transactionId}</p>
        <p><strong>Transaction Date:</strong> ${transaction.transactionDate.toISOString().split('T')[0]}</p>
        <p><strong>Due Date:</strong> ${transaction.dueDate.toISOString().split('T')[0]}</p>
        <p><strong>Transaction Type:</strong> ${transaction.transactionType}</p>
        <p><strong>Transaction SubType:</strong> ${transaction.transactionSubType}</p>
        <p><strong>Units:</strong> ${transaction.units}</p>
        <p><strong>Status:</strong> ${transaction.status}</p>
        <p><strong>Amount:</strong> $${transaction.amount.toLocaleString()}</p>
        <p><strong>Supplier Contact:</strong> ${transaction.supplierContact}</p>
        <h3>Line Item Details</h3>
        <ul>
          ${lineItemsHTML}
        </ul>
      `;
      modal.style.display = 'block';
    }

    closeModalBtn.onclick = function() {
      modal.style.display = 'none';
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }
  </script>

      var i, tabcontent, tabbuttons;

      if (tabName === "intelligence") {
          window.location.href = "general-motors-intelligence.html";
          return; // Exit the function since we're navigating away
      }
      if (tabName != "intelligence") {
        window.location.href = "general-motors.html?tabname=" + tabName;
        return; // Exit the function since we're navigating away
      }
      
    }
  </script>
